<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Ma Bibliothèque</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#14171f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Bibliothèque">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" href="icon-192.png">

<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="top">
  <div class="brand">
    <h1>Ma <span>Bibliothèque</span></h1>
    <button id="addBtn">+ Ajouter</button>
  </div>
  <div class="search-row">
    <input id="searchInput" type="search" placeholder="Chercher un titre, un auteur, un tag…" autocomplete="off">
  </div>
  <div class="shelf-filters" id="shelfFilters"></div>
  <div class="shelf-filters" id="sortControls"></div>
</header>

<div class="count-row" id="count">0 ouvrage</div>

<main>
  <div id="library">
    <div id="emptyState">
      <div class="big">Étagère vide</div>
      <p>Ajoute des PDF, CBZ, EPUB ou des images pour commencer ta bibliothèque.<br>Tout reste stocké uniquement sur cet appareil.</p>
    </div>
  </div>
</main>

<footer class="bottom">
  <div id="storageInfo"></div>
</footer>

<input type="file" id="fileInput" multiple accept=".pdf,.cbz,.cbr,.epub,.zip,.rar,image/*" style="display:none">

<!-- Lecteur -->
<div class="modal" id="readerModal">
  <div class="modal-panel reader">
    <div class="modal-head">
      <button class="icon-btn" id="closeReader">✕</button>
      <h2 id="readerTitle"></h2>
      <button class="icon-btn" id="readerModeBtn" style="display:none">↕</button>
    </div>
    <div id="readerViewer"><p class="reader-loading">Chargement…</p></div>
    <div id="readerNav"></div>
  </div>
</div>

<!-- Édition -->
<div class="modal" id="editModal">
  <div class="modal-panel">
    <div class="modal-head">
      <h2>Modifier</h2>
      <button class="icon-btn" id="closeEdit">✕</button>
    </div>
    <form id="editForm">
      <label for="editTitle">Titre</label>
      <input id="editTitle" required>
      <label for="editSeries">Série</label>
      <input id="editSeries" placeholder="ex: One Piece">
      <label for="editVolume">Tome / chapitre (numéro)</label>
      <input id="editVolume" type="number" placeholder="ex: 12">
      <label for="editAuthor">Auteur</label>
      <input id="editAuthor">
      <label for="editShelf">Étagère</label>
      <select id="editShelf"></select>
      <label for="editTags">Tags (séparés par des virgules)</label>
      <input id="editTags" placeholder="ex: seinen, romance, tome 3">
      <label class="checkbox-row">
        <input type="checkbox" id="editPrivate">
        <span>Section privée (masqué, protégé par mot de passe)</span>
      </label>
      <div class="modal-actions">
        <button type="button" class="btn-danger" id="deleteBookBtn">Supprimer</button>
        <button type="submit" class="btn-primary">Enregistrer</button>
      </div>
    </form>
  </div>
</div>

<!-- Vue "pile" d'une série -->
<div class="modal" id="seriesModal">
  <div class="modal-panel series-panel">
    <div class="modal-head">
      <div>
        <h2 id="seriesTitle"></h2>
        <p id="seriesCount" class="series-count"></p>
      </div>
      <button class="icon-btn" id="closeSeries">✕</button>
    </div>
    <div id="seriesGrid" class="series-grid"></div>
  </div>
</div>

<!-- Mot de passe section privée -->
<div class="modal" id="passwordModal">
  <div class="modal-panel">
    <div class="modal-head">
      <h2 id="passwordTitle">Section privée</h2>
    </div>
    <p id="passwordDesc" class="password-desc"></p>
    <form id="passwordForm">
      <label for="pw1">Mot de passe</label>
      <input id="pw1" type="password" autocomplete="off" required>
      <div id="pw2Wrap">
        <label for="pw2">Confirme le mot de passe</label>
        <input id="pw2" type="password" autocomplete="off">
      </div>
      <p id="passwordError" class="password-error"></p>
      <div class="modal-actions">
        <button type="button" class="btn-danger" id="passwordCancel">Annuler</button>
        <button type="submit" class="btn-primary">Valider</button>
      </div>
    </form>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/epubjs/dist/epub.min.js"></script>
<script src="db.js"></script>
<script src="parsers.js"></script>
<script src="app.js"></script>
</body>
</html>
